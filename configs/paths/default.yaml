# ============================================================
# 路径配置
# ============================================================
# 所有路径均相对于 Hydra 启动目录（${hydra:runtime.cwd}）
# 也可以在命令行中覆盖：
#   python train.py paths.root_dir=/your/absolute/path/experiments/exp1
# ============================================================

# 项目根目录（默认当前工作目录）
root_dir: "./"

# 临时文件目录
tmp_dir: ${paths.root_dir}tmp/

# 数据目录
data_dir: ${paths.root_dir}data/

# 日志目录
log_dir: ${paths.root_dir}logs/

# 输出目录（checkpoint、TensorBoard、配置日志等）
output_dir: ${paths.root_dir}artifacts/

# 推理样本输出目录
sample_dir: ${.output_dir}/samples/

# Hydra 运行时当前工作目录
work_dir: ${hydra:runtime.cwd}
