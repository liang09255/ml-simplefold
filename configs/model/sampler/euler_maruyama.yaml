# ============================================================
# euler_maruyama.yaml — 采样器配置（推理时用）
# ============================================================
# Euler-Maruyama 采样器：用简单的一阶 ODE 求解器从噪声还原结构
# 训练时只会用到它的 t_start / log_timesteps 参数
# ============================================================

_target_: model.torch.sampler.EMSampler

# 采样步数（推理时从噪声到结构的去噪步数）
# 500 步是质量和速度的平衡点
num_timesteps: 500

# 起始时间（防止 t=0 时的数值不稳定）
t_start: 1e-4

# 阈值参数（控制采样随机性）
tau: 0.3

# 是否使用对数间隔的时间步（True = 在 t 接近 0 时步长更细）
log_timesteps: True

# 截断权重（避免噪声过大时的发散）
w_cutoff: 0.99
