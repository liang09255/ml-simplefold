_target_: lightning.pytorch.trainer.Trainer
default_root_dir: ${paths.output_dir}

# 是否启用确定性运算（开启后运行更慢但完全可复现）
deterministic: False

# ─── 硬件加速器 ───
accelerator: gpu          # 使用 GPU（可选：cpu, gpu, auto）
devices: auto             # 使用多少 GPU（auto=全部可用 GPU）

# ─── 分布式策略 ───
strategy:
  _target_: lightning.pytorch.strategies.DDPStrategy
  find_unused_parameters: True    # 查找未使用的参数（有些 ESM 层可能冻结）
  gradient_as_bucket_view: True   # 优化梯度通信（DDP 加速）
  timeout:
    _target_: datetime.timedelta
    seconds: 1800                 # 每步超时时间（30 分钟）

num_nodes: 1              # 节点数（多节点训练时 >1）

# ─── 训练步数 ───
min_epochs: 1             # 最小 epoch（防止 early stopping 提前结束）
max_steps: 100000         # 最大训练步数
                          # 官方完整训练: 300000 步

# ─── 精度设置 ───
precision: bf16-mixed     # BF16 混合精度（推荐；CPU 上要改成 32-true）

# ─── 验证 & 检查点 ───
val_check_interval: 5000  # 每 N 步做一次验证 + 保存 checkpoint
check_val_every_n_epoch: null  # 设为 null 以使用步数而不是 epoch

num_sanity_val_steps: 0   # 跳过启动时的 sanity 验证（加速启动）
limit_val_batches: 0.0    # 0 = 不做验证（仅训练模式）
