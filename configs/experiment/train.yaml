# @package _global_
#
# ============================================================
# train.yaml — 官方默认训练配置（单机 DDP 多卡）
# ============================================================
# 用途：标准训练，使用 DDP（Distributed Data Parallel）在单机多卡上运行
#
# 用法：
#   python src/simplefold/train.py experiment=train
#   python src/simplefold/train.py experiment=train data=pdb_sp_afesm
#   python src/simplefold/train.py experiment=train model/architecture=foldingdit_3B
#
# 可换选项：
#   - data: [pdb, pdb_sp, pdb_sp_afesm, pdb_sp_afesme]
#   - model/architecture: [foldingdit_100M, 360M, 700M, 1.1B, 1.6B, 3B]
#   - trainer: [default, fsdp]
# ============================================================

defaults:
  - override /data: pdb                    # 仅用 PDB 数据（约 190K 结构）
  - override /model: simplefold
  - override /model/architecture: foldingdit_100M
  - override /model/sampler: euler_maruyama
  - override /model/processor: protein_processor
  - override /callbacks: default
  - override /trainer: default              # 使用 DDP（非 FSDP）
  - override /logger: tensorboard

# 从 checkpoint 恢复训练（取消注释并填写路径）
# load_ckpt_path: /path/to/your/checkpoint.ckpt

seed: 12345

trainer:
  max_steps: 300000                         # 总训练步数（30 万步 ≈ 3~5 天 on 8×A100）
  val_check_interval: 10000                 # 每 1 万步做一次验证 + 保存 checkpoint
  accumulate_grad_batches: 1                # 梯度累积步数（增大 = 模拟更大的 batch）

data:
  batch_size: 1                             # 总 batch size（= GPU 数量，因为每个 GPU 处理 1 个结构）
  num_workers: 16                           # 数据加载线程数

model:
  _target_: model.simplefold.SimpleFold
  ema_decay: 0.999
  clip_grad_norm_val: 2.0
  esm_model: "esm2_3B"                     # 官方默认使用 ESM2-3B
  lddt_weight_schedule: False               # 预训练阶段不用；微调时改为 True

  scheduler:
    _target_: utils.lr_scheduler.LinearWarmup
    _partial_: true
    min_lr: 1e-6
    max_lr: ${model.optimizer.lr}
    warmup_steps: 5000                      # 5000 步预热

  architecture:
    esm_model: ${model.esm_model}

  processor:
    scale: 16.0
    ref_scale: 5.0
    multiplicity: 16                         # 每 GPU 每个样本 16 个副本
