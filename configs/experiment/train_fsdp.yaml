# @package _global_
#
# ============================================================
# train_fsdp.yaml — FSDP 分布式训练配置（多节点大模型）
# ============================================================
# 用途：使用 FSDP（Fully Sharded Data Parallel）训练大模型
#       FSDP 把模型参数分片到多个 GPU 上，比 DDP 更省显存
#       适合 1.6B / 3B 以上规模的模型
#
# 用法：
#   python src/simplefold/train_fsdp.py experiment=train_fsdp
#
# 注意：必须用 train_fsdp.py 启动（不是 train.py）
#       train_fsdp.py 中额外创建了 FSDPStrategy 并设置了 auto_wrap_policy
#
# 可换选项：
#   - data: [pdb, pdb_sp, pdb_sp_afesm, pdb_sp_afesme]
#   - model/architecture: [foldingdit_100M, 360M, 700M, 1.1B, 1.6B, 3B]
#   - trainer: [default, fsdp]
# ============================================================

defaults:
  - override /data: pdb
  - override /model: simplefold
  - override /model/architecture: foldingdit_100M
  - override /model/sampler: euler_maruyama
  - override /model/processor: protein_processor
  - override /callbacks: default
  - override /trainer: fsdp                 # 使用 FSDP（train_fsdp.py 会创建 FSDPStrategy）
  - override /logger: tensorboard

# 从 checkpoint 恢复训练（取消注释并填写路径）
# load_ckpt_path: /path/to/your/checkpoint.ckpt

seed: 12345

trainer:
  max_steps: 300000                         # 总训练步数（30 万步）
  val_check_interval: 10000                 # 每 1 万步验证 + checkpoint
  accumulate_grad_batches: 1                # FSDP 下固定为 1

data:
  batch_size: 8                             # FSDP 下建议总 batch = GPU 数
  num_workers: 16

model:
  _target_: model.simplefold.SimpleFold
  ema_decay: 0.999
  clip_grad_norm_val: 2.0
  esm_model: "esm2_3B"
  lddt_weight_schedule: False

  scheduler:
    _target_: utils.lr_scheduler.LinearWarmup
    _partial_: true
    min_lr: 1e-6
    max_lr: ${model.optimizer.lr}
    warmup_steps: 5000

  architecture:
    esm_model: ${model.esm_model}

  processor:
    scale: 16.0
    ref_scale: 5.0
    multiplicity: 16
